version: "3.9"

services:
  # ── Bani ─────────────────────────────────────────────────────────
  bani:
    image: bani/bani:latest
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mssql:
        condition: service_healthy
    environment:
      PG_USER: bani_test
      PG_PASS: bani_test
      MYSQL_USER: bani_test
      MYSQL_PASS: bani_test
      MSSQL_USER: sa
      MSSQL_PASS: "BaniTest123!"
    volumes:
      - ./examples/bdl:/home/bani/bdl:ro
      - bani_projects:/home/bani/.bani/projects
    ports:
      - "8910:8910"
    networks: [bani-net]
    command: ["ui", "--host", "0.0.0.0"]

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bani_test
      POSTGRES_PASSWORD: bani_test
      POSTGRES_DB: bani_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bani_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [bani-net]

  # ── MySQL 8.4 ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: bani_test
      MYSQL_DATABASE: bani_test
      MYSQL_USER: bani_test
      MYSQL_PASSWORD: bani_test
    ports:
      - "3306:3306"
    tmpfs:
      - /var/lib/mysql
    command: --mysql-native-password=ON --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bani_test", "-pbani_test"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bani-net]

  # ── MySQL 5.7 ────────────────────────────────────────────────────
  mysql55:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: bani_test
      MYSQL_DATABASE: bani_test
      MYSQL_USER: bani_test
      MYSQL_PASSWORD: bani_test
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bani_test", "-pbani_test"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bani-net]

  # ── MSSQL 2022 ───────────────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    user: root
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: "BaniTest123!"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    healthcheck:
      test: [
        "CMD",
        "/opt/mssql-tools18/bin/sqlcmd",
        "-S", "localhost",
        "-U", "sa",
        "-P", "BaniTest123!",
        "-C",
        "-Q", "SELECT 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [bani-net]

  # ── Oracle 23 Free ───────────────────────────────────────────────
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    environment:
      ORACLE_PASSWORD: bani_test
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [bani-net]

volumes:
  oracle_data:
  bani_projects:

networks:
  bani-net:
    name: bani-test-net
