version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bani_test
      POSTGRES_PASSWORD: bani_test
      POSTGRES_DB: bani_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bani_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: bani_test
      MYSQL_DATABASE: bani_test
      MYSQL_USER: bani_test
      MYSQL_PASSWORD: bani_test
    ports:
      - "3306:3306"
    tmpfs:
      - /var/lib/mysql
    command: --mysql-native-password=ON --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bani_test", "-pbani_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql55:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: bani_test
      MYSQL_DATABASE: bani_test
      MYSQL_USER: bani_test
      MYSQL_PASSWORD: bani_test
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bani_test", "-pbani_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    user: root 
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: BaniTest123!
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    healthcheck:
      test: [
        "CMD",
        "/opt/mssql-tools/bin/sqlcmd",
        "-S",
        "localhost",
        "-U",
        "sa",
        "-P",
        "BaniTest123!",
        "-Q",
        "SELECT 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 10

  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    environment:
      ORACLE_PASSWORD: bani_test
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  oracle_data:

networks:
  default:
    name: bani-test-net
