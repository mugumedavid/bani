version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bani_test
      POSTGRES_PASSWORD: bani_test
      POSTGRES_DB: bani_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bani_test"]
      interval: 10s
      timeout: 5s
      retries: 5
