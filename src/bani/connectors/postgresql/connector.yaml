name: postgresql
driver: psycopg
driver_versions:
  - version: "3.2.x"
    supported_db:
      - "PostgreSQL 12"
      - "PostgreSQL 13"
      - "PostgreSQL 14"
      - "PostgreSQL 15"
      - "PostgreSQL 16"
      - "PostgreSQL 17"
  - version: "3.1.x"
    supported_db:
      - "PostgreSQL 11"
      - "PostgreSQL 12"
      - "PostgreSQL 13"
      - "PostgreSQL 14"
      - "PostgreSQL 15"
default_driver_version: "3.2.x"
