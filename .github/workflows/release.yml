name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Linux packages (.deb, .rpm, AppImage) ─────────────────────
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 cross-build)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build .deb via Docker
        run: |
          docker buildx build \
            -f pkg_build/deb.Dockerfile \
            --platform linux/${{ matrix.arch }} \
            --output type=local,dest=build/deb-${{ matrix.arch }} \
            .

      - name: Smoke test (.deb)
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v "$PWD/build/deb-${{ matrix.arch }}:/debs" \
            debian:bookworm-slim bash -c "
              dpkg -i /debs/*.deb &&
              /opt/bani/bin/bani --version
            "

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb-${{ matrix.arch }}
          path: build/deb-${{ matrix.arch }}/*.deb

  # ── Linux packages (.rpm, AppImage) — native x86_64 ──────────
  build-linux-extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build tools
        run: |
          pip install build
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Build wheel
        run: python -m build --wheel

      - name: Build .rpm
        run: PYTHONPATH=. python -m pkg_build.build_rpm

      - name: Build AppImage
        run: PYTHONPATH=. python -m pkg_build.build_appimage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-extras
          path: |
            build/*.rpm
            build/*.AppImage

  # ── macOS package (.pkg) ──────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build tools
        run: pip install build

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Build wheel
        run: python -m build --wheel

      - name: Build .pkg
        run: PYTHONPATH=. python -m pkg_build.build_macos

      - name: Smoke test
        run: |
          sudo installer -pkg build/bani-*.pkg -target /
          /opt/bani/bin/bani --version

      - uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: build/*.pkg

  # ── Windows installer (.exe) ──────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build tools
        run: |
          pip install build
          choco install innosetup -y

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Build wheel
        run: python -m build --wheel

      - name: Build .exe installer
        env:
          PYTHONPATH: '.'
        run: python -m pkg_build.build_windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: build/*-setup.exe

  # ── Docker image ──────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            banilabs/bani:latest
            banilabs/bani:${{ steps.version.outputs.tag }}
          platforms: linux/amd64,linux/arm64

  # ── Publish to PyPI ───────────────────────────────────────────
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    needs: [build-linux, build-linux-extras, build-macos, build-windows, build-docker, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-deb-amd64/*
            artifacts/linux-deb-arm64/*
            artifacts/linux-extras/*
            artifacts/macos-package/*
            artifacts/windows-package/*
          generate_release_notes: true
